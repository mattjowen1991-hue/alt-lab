<!-- QUOTE MODAL -->
<div class="modal-overlay" id="quoteModal">
  <div class="modal-panel">

    <div id="formView">
      <div class="modal-header">
        <div>
          <div class="modal-title">Get a <span>quote.</span></div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <p class="modal-sub">Tell me about your project and I'll be in touch shortly</p>

      <div class="quote-form" id="quoteForm">

        <div class="form-row">
          <div class="form-field">
            <label>Your name</label>
            <input type="text" id="f-name" placeholder="Jane Smith" required>
          </div>
          <div class="form-field">
            <label>Email address</label>
            <input type="email" id="f-email" placeholder="jane@example.com" required>
          </div>
        </div>

        <div class="form-field">
          <label>Business or project name</label>
          <input type="text" id="f-business" placeholder="e.g. Smith Plumbing, Personal Blog…">
        </div>

        <div class="form-row">
          <div class="form-field">
            <label>Type of website</label>
            <select id="f-type">
              <option value="" disabled selected>Select one…</option>
              <option>Business / brochure site</option>
              <option>E-commerce / online shop</option>
              <option>Portfolio / personal site</option>
              <option>Landing page</option>
              <option>Blog</option>
              <option>Something else</option>
            </select>
          </div>
          <div class="form-field">
            <label>Budget range</label>
            <select id="f-budget">
              <option value="" disabled selected>Select one…</option>
              <option>Under £500</option>
              <option>£500 – £1,000</option>
              <option>£1,000 – £2,500</option>
              <option>£2,500 – £5,000</option>
              <option>£5,000+</option>
              <option>Not sure yet</option>
            </select>
          </div>
        </div>

        <div class="form-field">
          <label>Do you have an existing website?</label>
          <select id="f-existing">
            <option value="" disabled selected>Select one…</option>
            <option>No — starting from scratch</option>
            <option>Yes — needs a redesign</option>
            <option>Yes — just needs updates</option>
          </select>
        </div>

        <div class="form-divider"></div>

        <div class="form-field">
          <label>Tell me about your project</label>
          <textarea id="f-desc" placeholder="What does your business do? What do you need the site to achieve? Any features in mind (e.g. gallery, booking form, online shop)?"></textarea>
        </div>

        <div class="form-field">
          <label>Ideal timeline</label>
          <select id="f-timeline">
            <option value="" disabled selected>Select one…</option>
            <option>ASAP</option>
            <option>Within 1 month</option>
            <option>1–3 months</option>
            <option>3+ months / flexible</option>
          </select>
        </div>

        <button class="form-submit" onclick="submitQuote()">Send enquiry →</button>
        <p class="form-note">I'll reply within 1–2 business days</p>

      </div>
    </div>

    <div class="modal-success" id="successView">
      <div class="success-tick">✓</div>
      <div class="success-title">Enquiry sent!</div>
      <p class="success-sub">Thanks for getting in touch.<br>I'll be back to you within 1–2 business days.</p>
      <button class="cta-btn" style="margin-top:0.5rem" onclick="closeModal()">Close</button>
    </div>

  </div>
</div>
